<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>關西櫻花之旅 - 伯鴻修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .active-tab { background-color: #059669 !important; color: white !important; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3); }
        .active-nav { color: #059669 !important; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .timeline-dot-景點 { background-color: #7C3AED; }
        .timeline-dot-美食 { background-color: #EA580C; }
        .timeline-dot-購物 { background-color: #DB2777; }
        .timeline-dot-移動 { background-color: #2563EB; }
        .type-tag-景點 { background-color: #F5F3FF; color: #7C3AED; }
        .type-tag-美食 { background-color: #FFF7ED; color: #EA580C; }
        .type-tag-購物 { background-color: #FDF2F8; color: #DB2777; }
        .type-tag-移動 { background-color: #EFF6FF; color: #2563EB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        #add-modal { display: none; z-index: 200; }
        #add-modal.active { display: flex; }
        .f-input { background-color: #f3f4f6; border: 2px solid transparent; border-radius: 1rem; padding: 0.8rem 1rem; font-size: 0.875rem; font-weight: 700; width: 100%; margin-bottom: 8px; transition: all 0.2s; }
        .f-input:focus { border-color: #10B981; background-color: white; outline: none; }
        .member-chip { border: 2px solid #e5e7eb; border-radius: 12px; padding: 6px 12px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .member-chip.selected { background-color: #059669; color: white; border-color: #059669; }
        footer { padding-bottom: env(safe-area-inset-bottom); height: calc(75px + env(safe-area-inset-bottom)); z-index: 50; }
        header { padding-top: calc(1.5rem + env(safe-area-inset-top)); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative text-gray-900">

    <div id="user-overlay" class="fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center p-10 hidden">
        <h2 class="text-2xl font-black mb-8 text-emerald-600">你是誰？</h2>
        <div id="user-selector-grid" class="grid grid-cols-2 gap-4 w-full"></div>
    </div>

    <header class="bg-white px-6 pb-5 flex justify-between items-center border-b border-gray-100 shadow-sm z-10">
        <div id="header-title-btn">
            <h1 class="text-xl font-black tracking-tight">🌸 關西櫻花之旅</h1>
            <p id="user-info-text" class="text-[9px] font-bold text-emerald-600 mt-0.5 uppercase tracking-widest italic">連線中...</p>
        </div>
        <div id="day-badge" class="bg-emerald-50 px-3 py-1.5 rounded-2xl text-emerald-600 text-xs font-black italic text-right">
            第 <span id="header-day-num">1</span> 天<br>
            <span id="header-date-str" class="text-[8px] opacity-70">4/13</span>
        </div>
    </header>

    <div id="day-bar" class="bg-white px-6 py-3 border-b border-gray-100 overflow-x-auto no-scrollbar hidden">
        <nav id="day-tabs-nav" class="flex space-x-2"></nav>
    </div>

    <main class="flex-grow overflow-y-auto relative pb-40">
        <section id="page-itinerary" class="page-content active px-6 py-6"><div id="itinerary-list" class="space-y-8"></div></section>
        <section id="page-checklist" class="page-content px-6 py-8"><h2 class="text-xl font-black mb-6 text-emerald-700">🧳 我的行李 (私有)</h2><div id="checklist-list" class="space-y-3"></div></section>
        <section id="page-budget" class="page-content px-6 py-8">
            <h2 class="text-xl font-black mb-6">💰 支出與分帳</h2>
            <div id="budget-list" class="space-y-4"></div>
        </section>
        <section id="page-notes" class="page-content px-6 py-8"><h2 class="text-xl font-black mb-6 text-amber-600">📓 旅行筆記</h2><div id="notes-list" class="space-y-4"></div></section>
    </main>

    <button id="fab-add" class="fixed bottom-32 right-6 w-16 h-16 bg-emerald-600 text-white rounded-full shadow-lg flex items-center justify-center transition-all active:scale-90 z-[100]">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
    </button>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-between items-center text-gray-300 px-8 pb-safe shadow-inner">
        <button id="nav-itinerary" class="flex flex-col items-center active-nav py-3"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span class="text-[9px] mt-1 font-bold">行程</span></button>
        <button id="nav-checklist" class="flex flex-col items-center py-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span class="text-[9px] mt-1 font-bold">行李</span></button>
        <button id="nav-budget" class="flex flex-col items-center py-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[9px] mt-1 font-bold">分帳</span></button>
        <button id="nav-notes" class="flex flex-col items-center py-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span class="text-[9px] mt-1 font-bold">筆記</span></button>
    </footer>

    <div id="add-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl max-h-[85vh] overflow-y-auto">
            <h2 id="modal-title-text" class="text-xl font-black mb-6 text-emerald-600 italic">✨ 新增行程</h2>
            <div id="modal-fields-container"></div>
            <div class="flex space-x-3 mt-8">
                <button id="modal-cancel-btn" class="flex-1 py-4 text-sm font-black text-gray-400">取消</button>
                <button id="modal-save-btn" class="flex-1 py-4 bg-emerald-600 text-white text-sm font-black rounded-2xl shadow-lg active:bg-emerald-700">確認儲存</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set as fbSet } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://kansai-trip-6ae98-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const MEMBERS = ["木木", "癡心杰對", "志在剛好", "阿汶美女"];
        const DATES = ["4/13", "4/14", "4/15", "4/16", "4/17", "4/18", "4/19", "4/20"];
        const ICONS = { "景點": "⛩️", "美食": "🍜", "購物": "🛍️", "移動": "🚃" };
        
        let currentUser = localStorage.getItem('BH_User_v5');
        let currentDay = 1, currentPage = 'itinerary', editIndex = -1;
        let tripData = DATES.map((d, i) => ({ day: i+1, date: d, activities: [] }));
        let notes = [], publicSpendings = [];
        let privateChecklist = JSON.parse(localStorage.getItem('BH_Check_v5')) || [{ text: "護照", done: false }];

        const syncAndRender = () => {
            if (!currentUser) { showUserOverlay(); return; }
            document.getElementById('user-overlay').classList.add('hidden');
            document.getElementById('user-info-text').innerText = `USER: ${currentUser}`;
            document.getElementById('header-day-num').innerText = currentDay;
            document.getElementById('header-date-str').innerText = DATES[currentDay-1];
            
            const hasDay = ['itinerary','budget'].includes(currentPage);
            document.getElementById('day-bar').style.display = hasDay ? 'block' : 'none';
            document.getElementById('day-badge').style.display = hasDay ? 'block' : 'none';
            
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${currentPage}`).classList.add('active');

            if (hasDay) renderDayTabs();
            if (currentPage === 'itinerary') renderItinerary();
            else if (currentPage === 'checklist') renderChecklist();
            else if (currentPage === 'budget') renderBudget();
            else if (currentPage === 'notes') renderNotes();
        };

        // Firebase 監聽
        onValue(ref(db, 'tripData'), (s) => { if(s.val()) tripData = s.val(); syncAndRender(); });
        onValue(ref(db, 'notes'), (s) => { if(s.val()) notes = s.val(); syncAndRender(); });
        onValue(ref(db, 'publicSpend'), (s) => { if(s.val()) publicSpendings = s.val(); syncAndRender(); });

        function renderDayTabs() {
            const nav = document.getElementById('day-tabs-nav');
            nav.innerHTML = DATES.map((d, i) => `<button class="day-tab flex-shrink-0 px-5 py-2 rounded-2xl text-xs font-black flex flex-col items-center ${currentDay === i+1 ? 'active-tab' : 'bg-gray-100 text-gray-400'}" data-day="${i+1}"><span>Day ${i+1}</span><span class="text-[8px] opacity-60">${d}</span></button>`).join('');
            nav.querySelectorAll('.day-tab').forEach(btn => { btn.onclick = () => { currentDay = parseInt(btn.dataset.day); syncAndRender(); }; });
        }

        function renderItinerary() {
            const list = document.getElementById('itinerary-list');
            const dayActs = tripData[currentDay-1]?.activities || [];
            list.innerHTML = dayActs.map((a, i) => `
                <div class="flex items-start space-x-4">
                    <div class="flex flex-col items-center mt-1">
                        <div class="w-10 h-10 rounded-full border-4 border-white shadow-md flex items-center justify-center text-white timeline-dot-${a.type}"><span class="text-xs">${ICONS[a.type] || "📍"}</span></div>
                        <span class="text-[9px] font-black text-gray-400 mt-2">${a.time}</span>
                    </div>
                    <div class="flex-grow bg-white rounded-3xl p-5 card-shadow border border-gray-50 relative">
                        <div class="absolute top-4 right-4 flex space-x-2">
                            <button class="edit-btn text-emerald-600 text-xs font-bold" data-idx="${i}">編輯</button>
                            <button class="del-btn text-red-400 text-xs font-bold" data-idx="${i}">刪除</button>
                        </div>
                        <h3 class="font-black text-gray-900 pr-12">${a.title}</h3>
                        <span class="text-[9px] px-2 py-0.5 rounded-full font-black type-tag-${a.type} mt-1 inline-block italic uppercase">${a.type}</span>
                        ${a.note ? `<div class="text-[#ef4444] font-black text-[11px] mt-2 italic"># ${a.note}</div>` : ''}
                    </div>
                </div>`).join('') || `<p class="text-center text-gray-300 py-10 italic">點擊右下角新增第 ${currentDay} 天行程</p>`;
            
            list.querySelectorAll('.edit-btn').forEach(b => b.onclick = () => { editIndex = parseInt(b.dataset.idx); openModal(); });
            list.querySelectorAll('.del-btn').forEach(b => b.onclick = () => { if(confirm("確定刪除？")) { tripData[currentDay-1].activities.splice(parseInt(b.dataset.idx), 1); fbSet(ref(db, 'tripData'), tripData); } });
        }

        function renderChecklist() {
            const list = document.getElementById('checklist-list');
            list.innerHTML = privateChecklist.map((item, i) => `<div class="flex items-center bg-white p-4 rounded-2xl border border-gray-50"><label class="flex items-center flex-grow space-x-3"><input type="checkbox" ${item.done ? 'checked' : ''} class="ck-box w-5 h-5 accent-emerald-600" data-idx="${i}"><span class="text-sm font-black ${item.done ? 'text-gray-300 line-through italic' : ''}">${item.text}</span></label><button class="del-check text-red-300 font-bold" data-idx="${i}">✕</button></div>`).join('');
            list.querySelectorAll('.ck-box').forEach(ck => ck.onchange = () => { privateChecklist[ck.dataset.idx].done = ck.checked; localStorage.setItem('BH_Check_v5', JSON.stringify(privateChecklist)); syncAndRender(); });
            list.querySelectorAll('.del-check').forEach(b => b.onclick = () => { privateChecklist.splice(parseInt(b.dataset.idx), 1); localStorage.setItem('BH_Check_v5', JSON.stringify(privateChecklist)); syncAndRender(); });
        }

        // --- 核心彈窗與儲存 (徹底解決不儲存問題) ---
        function openModal() {
            const container = document.getElementById('modal-fields-container');
            const modalTitle = document.getElementById('modal-title-text');
            
            if (currentPage === 'itinerary') {
                modalTitle.innerText = editIndex === -1 ? "✨ 新增行程" : "✎ 編輯行程";
                container.innerHTML = `
                    <div class="grid grid-cols-2 gap-2">
                        <input id="in-time" type="text" placeholder="時間(例如 0900)" class="f-input">
                        <select id="in-type" class="f-input"><option>景點</option><option>美食</option><option>購物</option><option>移動</option></select>
                    </div>
                    <input id="in-title" type="text" placeholder="地點名稱" class="f-input">
                    <input id="in-note" type="text" placeholder="備註標籤 (選填)" class="f-input">
                `;
                if(editIndex !== -1) {
                    const a = tripData[currentDay-1].activities[editIndex];
                    document.getElementById('in-time').value = a.time.replace(':','');
                    document.getElementById('in-title').value = a.title;
                    document.getElementById('in-type').value = a.type;
                    document.getElementById('in-note').value = a.note || "";
                }
            } else if (currentPage === 'checklist') {
                modalTitle.innerText = "新增行李";
                container.innerHTML = `<input id="in-check" type="text" placeholder="行李項目" class="f-input">`;
            } else if (currentPage === 'notes') {
                modalTitle.innerText = "新增攻略";
                container.innerHTML = `<input id="in-note-t" type="text" placeholder="標題" class="f-input"><input id="in-note-l" type="text" placeholder="連結 (https://...)" class="f-input">`;
            }
            
            document.getElementById('add-modal').classList.add('active');
        }

        function handleSave() {
            console.log("開始儲存流程...");
            if (currentPage === 'itinerary') {
                const title = document.getElementById('in-title').value;
                const timeStr = document.getElementById('in-time').value || "0000";
                const type = document.getElementById('in-type').value;
                const note = document.getElementById('in-note').value;
                
                if (!title) { alert("請輸入行程名稱！"); return; }
                
                // 格式化時間
                let cleanTime = timeStr.replace(/\D/g, '');
                if(cleanTime.length < 4) cleanTime = cleanTime.padStart(4, '0');
                const formattedTime = cleanTime.substring(0,2) + ":" + cleanTime.substring(2,4);

                const newActivity = { title, time: formattedTime, type, note, cost: 0 };

                if (editIndex === -1) {
                    if(!tripData[currentDay-1].activities) tripData[currentDay-1].activities = [];
                    tripData[currentDay-1].activities.push(newActivity);
                } else {
                    tripData[currentDay-1].activities[editIndex] = newActivity;
                }
                
                tripData[currentDay-1].activities.sort((a,b) => a.time.localeCompare(b.time));
                fbSet(ref(db, 'tripData'), tripData).then(() => {
                    console.log("行程儲存成功");
                    closeModal();
                });

            } else if (currentPage === 'checklist') {
                const val = document.getElementById('in-check').value;
                if(val) { privateChecklist.push({text: val, done: false}); localStorage.setItem('BH_Check_v5', JSON.stringify(privateChecklist)); }
                closeModal();
                syncAndRender();
            } else if (currentPage === 'notes') {
                const title = document.getElementById('in-note-t').value;
                const link = document.getElementById('in-note-l').value;
                if(title) { notes.push({title, link}); fbSet(ref(db, 'notes'), notes); }
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('add-modal').classList.remove('active');
            editIndex = -1;
        }

        function showUserOverlay() {
            const grid = document.getElementById('user-selector-grid');
            grid.innerHTML = MEMBERS.map(m => `<button class="user-pick bg-gray-100 p-4 rounded-2xl font-black text-gray-600 active:bg-emerald-600 active:text-white" data-user="${m}">${m}</button>`).join('');
            document.getElementById('user-overlay').classList.remove('hidden');
            grid.querySelectorAll('.user-pick').forEach(btn => btn.onclick = () => { localStorage.setItem('BH_User_v5', btn.dataset.user); location.reload(); });
        }

        // --- 真正的事件綁定 ---
        document.getElementById('fab-add').addEventListener('click', openModal);
        document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-save-btn').addEventListener('click', handleSave);
        
        document.getElementById('nav-itinerary').onclick = () => { currentPage = 'itinerary'; syncAndRender(); };
        document.getElementById('nav-checklist').onclick = () => { currentPage = 'checklist'; syncAndRender(); };
        document.getElementById('nav-budget').onclick = () => { currentPage = 'budget'; syncAndRender(); };
        document.getElementById('nav-notes').onclick = () => { currentPage = 'notes'; syncAndRender(); };
        
        document.getElementById('header-title-btn').onclick = () => { if(confirm("切換使用者？")) { localStorage.clear(); location.reload(); } };

        syncAndRender();
    </script>
</body>
</html>
