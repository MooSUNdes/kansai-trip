<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關西家庭旅遊 - 伯鴻終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .active-tab { background-color: #059669 !important; color: white !important; }
        .active-nav { color: #059669 !important; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .type-tag-景點 { background-color: #F5F3FF; color: #7C3AED; }
        .type-tag-美食 { background-color: #FFF7ED; color: #EA580C; }
        .type-tag-購物 { background-color: #FDF2F8; color: #DB2777; }
        .type-tag-移動 { background-color: #EFF6FF; color: #2563EB; }
        .timeline-dot-景點 { background-color: #7C3AED; }
        .timeline-dot-美食 { background-color: #EA580C; }
        .timeline-dot-購物 { background-color: #DB2777; }
        .timeline-dot-移動 { background-color: #2563EB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        #add-modal { display: none; }
        #add-modal.active { display: flex; }
        .f-input { background-color: #f3f4f6; border: none; border-radius: 1rem; padding: 0.8rem 1rem; font-size: 0.875rem; font-weight: 700; width: 100%; margin-bottom: 8px; }
        .member-chip { border: 2px solid #e5e7eb; border-radius: 12px; padding: 6px 12px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .member-chip.selected { background-color: #059669; color: white; border-color: #059669; }
        .hashtag-red { color: #ef4444; font-weight: 800; font-size: 11px; margin-top: 6px; display: inline-block; }
        .icon-btn { opacity: 0.3; transition: opacity 0.2s; cursor: pointer; }
        .icon-btn:hover { opacity: 1; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative text-gray-900">

    <header class="bg-white px-6 py-5 flex justify-between items-center border-b border-gray-100 shadow-sm z-10">
        <div onclick="confirmReset()">
            <h1 class="text-xl font-black tracking-tight">🌸 關西櫻花之旅</h1>
            <p class="text-[9px] font-bold text-gray-400 mt-0.5 tracking-widest uppercase italic">4.13 - 4.20 | 終極筆記版</p>
        </div>
        <div id="day-badge" class="bg-emerald-50 px-3 py-1.5 rounded-2xl text-emerald-600 text-xs font-black italic">第 <span id="header-day">1</span> 天</div>
    </header>

    <main class="flex-grow overflow-y-auto relative">
        <section id="page-itinerary" class="page-content active px-6 py-6">
            <div class="flex items-center space-x-2 mb-6 overflow-x-auto no-scrollbar pb-2">
                <nav id="day-tabs" class="flex space-x-2"></nav>
                <button onclick="openFullRoute()" class="flex-shrink-0 px-4 py-2 rounded-2xl text-xs font-black bg-blue-500 text-white shadow-lg active:scale-95">🗺️ 路線總覽</button>
            </div>
            <div id="itinerary-content" class="space-y-8 pb-32 relative"><div class="absolute left-4 top-0 bottom-0 w-0.5 bg-gray-100 -z-10"></div></div>
        </section>

        <section id="page-checklist" class="page-content px-6 py-8"><h2 class="text-xl font-black mb-6 text-emerald-700">🧳 行李清單</h2><div id="checklist-container" class="space-y-3 pb-24"></div></section>
        
        <section id="page-budget" class="page-content px-6 py-8">
            <h2 class="text-xl font-black mb-6">💰 預算與分帳</h2>
            <div class="bg-white p-8 rounded-[2rem] card-shadow border border-gray-50 text-center mb-6">
                <p class="text-gray-400 text-[10px] font-bold mb-1 uppercase">今日總支出</p>
                <p id="total-budget" class="text-4xl font-black text-emerald-600">¥0</p>
            </div>
            <div id="budget-list" class="space-y-4 pb-32"></div>
        </section>

        <section id="page-notes" class="page-content px-6 py-8">
            <h2 class="text-xl font-black mb-6 text-amber-600">📓 旅行筆記本</h2>
            <div id="notes-list" class="space-y-4 pb-32"></div>
        </section>
    </main>

    <button onclick="handleFabClick()" class="absolute bottom-24 right-6 w-14 h-14 bg-emerald-600 text-white rounded-full shadow-2xl flex items-center justify-center z-20 active:scale-90 transition-all"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg></button>

    <div id="add-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl max-h-[85vh] overflow-y-auto">
            <h2 id="modal-title" class="text-xl font-black mb-6 italic text-emerald-600">編輯項目</h2>
            <div id="modal-fields"></div>
            <div class="flex space-x-3 mt-8">
                <button onclick="toggleModal(false)" class="flex-1 py-4 text-sm font-black text-gray-400">取消</button>
                <button onclick="saveEntry()" class="flex-1 py-4 bg-emerald-600 text-white text-sm font-black rounded-2xl shadow-lg">確認儲存</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-gray-100 px-6 py-5 flex justify-between items-center z-10 shadow-inner text-gray-300">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="flex flex-col items-center active-nav"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span class="text-[9px] mt-1 font-black">行程</span></button>
        <button onclick="switchPage('checklist')" id="nav-checklist" class="flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span class="text-[9px] mt-1 font-black">行李</span></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[9px] mt-1 font-black">分帳</span></button>
        <button onclick="switchPage('notes')" id="nav-notes" class="flex flex-col items-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span class="text-[9px] mt-1 font-black">筆記</span></button>
    </footer>

    <script>
        const MEMBERS = ["木木", "癡心杰對", "志在剛好", "阿汶美女"];
        const STORE_KEY = 'BH_Kansai_Ultimate_vFinal';
        const typeIcons = { "景點": "⛩️", "美食": "🍜", "購物": "🛍️", "移動": "🚃" };
        let currentDay = 1, currentPage = 'itinerary', editIndex = -1;

        // 時間格式化
        function formatTime(val) {
            let digits = val.replace(/\D/g, '');
            if (digits.length === 1) digits = "0" + digits + "00";
            else if (digits.length === 2) digits = digits + "00";
            else if (digits.length === 3) digits = "0" + digits;
            else if (digits.length > 4) digits = digits.substring(0, 4);
            else if (digits.length === 0) return "00:00";
            return digits.substring(0, 2) + ":" + digits.substring(2, 4);
        }

        const defaultTrip = [{ day: 1, activities: [], spendings: [] }];
        while(defaultTrip.length < 8) defaultTrip.push({ day: defaultTrip.length+1, activities: [], spendings: [] });

        let tripData = JSON.parse(localStorage.getItem(STORE_KEY)) || defaultTrip;
        let checklist = JSON.parse(localStorage.getItem('BH_Check_vFinal')) || [{ text: "護照", done: false }];
        let notes = JSON.parse(localStorage.getItem('BH_Notes_vFinal')) || [{ title: "範例：東京燒肉", link: "https://www.google.com" }];

        function save() { 
            localStorage.setItem(STORE_KEY, JSON.stringify(tripData)); 
            localStorage.setItem('BH_Check_vFinal', JSON.stringify(checklist));
            localStorage.setItem('BH_Notes_vFinal', JSON.stringify(notes));
        }

        function renderAll() {
            document.getElementById('header-day').innerText = currentDay;
            document.getElementById('day-badge').style.display = (currentPage === 'itinerary' || currentPage === 'budget') ? 'block' : 'none';
            if (currentPage === 'itinerary') renderItinerary();
            if (currentPage === 'checklist') renderChecklist();
            if (currentPage === 'budget') renderBudget();
            if (currentPage === 'notes') renderNotes();
        }

        function renderItinerary() {
            const data = tripData[currentDay-1];
            document.getElementById('day-tabs').innerHTML = tripData.map((d, i) => `<button onclick="currentDay=${i+1}; renderAll()" class="flex-shrink-0 px-6 py-2 rounded-2xl text-xs font-black transition-all ${currentDay === i+1 ? 'active-tab shadow-lg shadow-emerald-100' : 'bg-gray-100 text-gray-400'}">第 ${i+1} 天</button>`).join('');
            document.getElementById('itinerary-content').innerHTML = data.activities.map((a, i) => `
                <div class="flex items-start space-x-4">
                    <div class="flex flex-col items-center mt-1">
                        <div class="w-10 h-10 rounded-full border-4 border-white shadow-md flex flex-center justify-center text-white timeline-dot-${a.type}"><span class="text-[10px] font-black leading-none mb-0.5">${i+1}</span><span class="text-xs leading-none">${typeIcons[a.type]}</span></div>
                        <span class="text-[9px] font-black text-gray-400 mt-2">${a.time}</span>
                    </div>
                    <div class="flex-grow bg-white rounded-3xl p-5 card-shadow border border-gray-50 relative">
                        <div class="absolute top-4 right-4 flex space-x-2"><button onclick="editEntry(${i})" class="icon-btn text-emerald-600">✎</button><button onclick="deleteActivity(${i})" class="icon-btn text-red-400">✕</button></div>
                        <h3 class="font-black text-gray-900 pr-12">${a.title}</h3>
                        <span class="text-[9px] px-2 py-0.5 rounded-full font-black type-tag-${a.type} mt-1 inline-block uppercase italic">${a.type}</span>
                        ${a.note ? `<div class="hashtag-red"># ${a.note}</div>` : ''}
                        <div class="flex justify-between items-center mt-4 border-t border-gray-50 pt-3"><span class="text-[10px] font-black text-gray-400 italic">¥${a.cost.toLocaleString()}</span><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.address || a.title)}" target="_blank" class="px-3 py-1 bg-emerald-50 rounded-xl text-emerald-600 text-[10px] font-black italic">導航 📍</a></div>
                    </div>
                </div>`).join('');
        }

        function renderNotes() {
            document.getElementById('notes-list').innerHTML = notes.map((n, idx) => `
                <div class="bg-white p-5 rounded-3xl card-shadow border border-gray-100 relative">
                    <div class="absolute top-4 right-4 flex space-x-2"><button onclick="editEntry(${idx})" class="icon-btn text-emerald-600">✎</button><button onclick="deleteNote(${idx})" class="delete-btn px-1">✕</button></div>
                    <h4 class="font-black text-gray-900 pr-12 text-lg mb-2">${n.title}</h4>
                    <div class="flex items-center justify-between mt-4">
                        <span class="text-[9px] font-black text-gray-400 uppercase italic">旅行攻略筆記</span>
                        ${n.link ? `<a href="${n.link}" target="_blank" class="px-4 py-2 bg-blue-50 rounded-xl text-blue-600 text-[10px] font-black italic shadow-sm active:scale-95">開啟網址 🌐</a>` : ''}
                    </div>
                </div>`).join('');
        }

        function handleFabClick() {
            const fields = document.getElementById('modal-fields');
            const title = document.getElementById('modal-title');
            title.innerText = editIndex === -1 ? "✨ 新增內容" : "✎ 編輯內容";
            fields.innerHTML = '';
            
            if (currentPage === 'itinerary') {
                fields.innerHTML = `<div class="grid grid-cols-2 gap-2"><input id="in-time" type="text" placeholder="時間(0900)" class="f-input"><select id="in-type" class="f-input"><option>景點</option><option>美食</option><option>購物</option><option>移動</option></select></div><input id="in-title" type="text" placeholder="名稱" class="f-input"><input id="in-note" type="text" placeholder="標籤備註" class="f-input"><input id="in-address" type="text" placeholder="地址" class="f-input"><input id="in-cost" type="number" placeholder="費用" class="f-input">`;
            } else if (currentPage === 'checklist') {
                fields.innerHTML = `<input id="in-check-text" type="text" placeholder="項目名稱" class="f-input">`;
            } else if (currentPage === 'budget') {
                fields.innerHTML = `<input id="in-spend-title" type="text" placeholder="項目" class="f-input"><input id="in-spend-cost" type="number" placeholder="金額" class="f-input"><p class="text-[10px] font-black text-gray-400 mt-2 uppercase italic">Payer</p><select id="in-payer" class="f-input">${MEMBERS.map(m => `<option>${m}</option>`).join('')}</select><div class="flex items-center justify-between py-2"><span class="text-xs font-black">是否分帳？</span><input type="checkbox" id="is-split" checked onchange="toggleParticipantUI(this.checked)" class="w-5 h-5 accent-emerald-600"></div><div id="participant-ui" class="space-y-2"><div class="flex flex-wrap gap-2">${MEMBERS.map(m => `<div class="member-chip selected" onclick="this.classList.toggle('selected')">${m}</div>`).join('')}</div></div>`;
            } else if (currentPage === 'notes') {
                fields.innerHTML = `<input id="in-note-title" type="text" placeholder="筆記標題 (如：燒肉推薦)" class="f-input"><input id="in-note-link" type="text" placeholder="網址 (https://...)" class="f-input">`;
            }
            toggleModal(true);
        }

        function saveEntry() {
            if (currentPage === 'itinerary') {
                const day = tripData[currentDay-1];
                const entry = { time: formatTime(document.getElementById('in-time').value), title: document.getElementById('in-title').value || "未命名", type: document.getElementById('in-type').value, note: document.getElementById('in-note').value, cost: parseInt(document.getElementById('in-cost').value) || 0, address: document.getElementById('in-address').value };
                if (editIndex === -1) day.activities.push(entry); else day.activities[editIndex] = entry;
                day.activities.sort((a,b) => a.time.localeCompare(b.time));
            } else if (currentPage === 'checklist') {
                const text = document.getElementById('in-check-text').value; if(text) { if(editIndex === -1) checklist.push({ text, done: false }); else checklist[editIndex].text = text; }
            } else if (currentPage === 'budget') {
                const isSplit = document.getElementById('is-split').checked;
                const cost = parseInt(document.getElementById('in-spend-cost').value) || 0;
                const participants = []; if(isSplit) document.querySelectorAll('.member-chip.selected').forEach(el => participants.push(el.innerText));
                const entry = { title: document.getElementById('in-spend-title').value || "支出", cost, payer: document.getElementById('in-payer').value, isSplit, participants, perPerson: Math.round(cost / (participants.length || 1)) };
                if (editIndex === -1) tripData[currentDay-1].spendings.push(entry); else tripData[currentDay-1].spendings[editIndex] = entry;
            } else if (currentPage === 'notes') {
                const entry = { title: document.getElementById('in-note-title').value || "未命名筆記", link: document.getElementById('in-note-link').value };
                if (editIndex === -1) notes.push(entry); else notes[editIndex] = entry;
            }
            editIndex = -1; save(); renderAll(); toggleModal(false);
        }

        // 基本邏輯
        function toggleParticipantUI(c) { document.getElementById('participant-ui').style.display = c ? 'block' : 'none'; }
        function deleteActivity(i) { if(confirm("刪除？")) { tripData[currentDay-1].activities.splice(i, 1); save(); renderItinerary(); } }
        function deleteChecklist(i) { checklist.splice(i, 1); save(); renderChecklist(); }
        function deleteNote(i) { if(confirm("刪除筆記？")) { notes.splice(i, 1); save(); renderNotes(); } }
        function deleteBudget(i) { if(confirm("刪除記帳？")) { tripData[currentDay-1].spendings.splice(i, 1); save(); renderBudget(); } }
        function toggleCheck(i) { checklist[i].done = !checklist[i].done; save(); renderChecklist(); }
        function renderChecklist() { document.getElementById('checklist-container').innerHTML = checklist.map((item, idx) => `<div class="flex items-center bg-white p-4 rounded-2xl card-shadow border border-gray-50"><label class="flex items-center flex-grow space-x-3"><input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleCheck(${idx})" class="w-5 h-5 accent-emerald-600"><span class="text-sm font-black ${item.done ? 'text-gray-300 line-through italic' : ''}">${item.text}</span></label><div class="flex space-x-2"><button onclick="editEntry(${idx})" class="icon-btn text-emerald-600">✎</button><button onclick="deleteChecklist(${idx})" class="delete-btn px-1">✕</button></div></div>`).join(''); }
        function renderBudget() { const day = tripData[currentDay-1]; const total = day.spendings.reduce((s, x) => s + x.cost, 0); document.getElementById('total-budget').innerText = `¥${total.toLocaleString()}`; document.getElementById('budget-list').innerHTML = day.spendings.map((s, idx) => `<div class="bg-white p-5 rounded-3xl card-shadow border border-gray-100 relative"><div class="absolute top-4 right-4 flex space-x-2"><button onclick="editEntry(${idx})" class="icon-btn text-emerald-600">✎</button><button onclick="deleteBudget(${idx})" class="delete-btn">✕</button></div><h4 class="font-black text-gray-900">${s.title} <span class="text-emerald-600 ml-2">¥${s.cost.toLocaleString()}</span></h4><p class="mt-2 text-[10px] font-bold text-gray-400 uppercase leading-tight">Payer: ${s.payer} ${s.isSplit ? `<br>Split: ${s.participants.join(', ')} | Per: ¥${s.perPerson.toLocaleString()}` : '| Private'}</p></div>`).join(''); }
        function openFullRoute() { const locs = tripData[currentDay-1].activities.map(a => a.address || a.title); if(locs.length < 1) return alert("無行程"); window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(locs[0])}&destination=${encodeURIComponent(locs[locs.length-1])}${locs.length > 2 ? '&waypoints=' + locs.slice(1, -1).map(l => encodeURIComponent(l)).join('|') : ''}`, '_blank'); }
        function switchPage(p) { currentPage = p; editIndex = -1; document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active')); document.getElementById(`page-${p}`).classList.add('active'); document.querySelectorAll('footer button').forEach(b => b.classList.replace('active-nav', 'text-gray-300')); document.getElementById(`nav-${p}`).classList.replace('text-gray-300', 'active-nav'); renderAll(); }
        function toggleModal(s) { if(!s) editIndex = -1; document.getElementById('add-modal').classList.toggle('active', s); }
        function editEntry(idx) { 
            editIndex = idx; handleFabClick();
            if (currentPage === 'notes') {
                document.getElementById('in-note-title').value = notes[idx].title;
                document.getElementById('in-note-link').value = notes[idx].link;
            }
            // 其他編輯邏輯保持原樣
        }
        function confirmReset() { if(confirm("重置所有資料？")) { localStorage.clear(); location.reload(); } }
        window.onload = renderAll;
    </script>
</body>
</html>
